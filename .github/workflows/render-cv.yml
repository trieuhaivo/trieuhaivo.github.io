name: Render a CV
on:
  push:
    branches:
      - main
      - master
    paths:
      - "_data/cv.yml"
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rendercv:
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install RenderCV
        run: |
          pip install -r requirements.txt
      - name: RenderCV (v2 syntax — design/locale embedded in cv.yml)
        run: |
          if [ ! -f _data/cv.yml ]; then
            echo "No _data/cv.yml file found!"
            exit 1
          fi
          mkdir -p assets/rendercv/rendercv_output
          cd assets/rendercv
          rendercv render ../../_data/cv.yml
          rm -f rendercv_output/*.typ
      - name: Upload rendercv_output as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCV Output
          path: assets/rendercv/rendercv_output
      - name: Push the changes
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No CV changes to commit."
          else
            git commit -m "chore: render the latest CV"
            git push
          fi
