# RenderCV v2 settings (cv.yml is the single source for both al-folio liquid + rendercv PDF).
# Al-folio templates only read `cv.*`; design/locale below are consumed only by `rendercv render`.
design:
  theme: engineeringclassic
  page:
    size: us-letter
    top_margin: 1.5cm
    bottom_margin: 1.5cm
    left_margin: 1.5cm
    right_margin: 1.5cm
    show_page_numbering: true
  colors:
    text: rgb(17, 24, 39)
    name: rgb(0, 33, 71)
    connections: rgb(17, 24, 39)
    section_titles: rgb(0, 33, 71)
    links: rgb(0, 51, 102)  # darkened from rgb(14,77,146) for higher PDF contrast (~7:1 vs body text)
  text:
    font_family: XCharter
    font_size: 10pt
    leading: 0.85em
    alignment: justified
  highlights:
    vertical_space_between_highlights: 0.28cm
    top_margin: 0.25cm
  entries:
    vertical_space_between_entries: 1.05em
  section_titles:
    type: with-partial-line
    font_family: XCharter
    font_size: 1.3em
    bold: true
    small_caps: false
    vertical_space_above: 0.35cm
    vertical_space_below: 0.3cm
  header:
    name_font_family: XCharter
    name_font_size: 28pt
    name_bold: true
    small_caps_for_name: false
    connections_font_family: XCharter
    separator_between_connections: " · "
    vertical_space_between_name_and_connections: 0.4cm
    vertical_space_between_connections_and_first_section: 0.5cm
    horizontal_space_between_connections: 0.4cm
    alignment: center
locale:
  language: en

